# ShimaoreBERT v2 — Training Configuration
# ==========================================
# Used by training/train.py  (HuggingFace Trainer API)

model:
  architecture: bert-seq2seq
  hidden_size: 512
  num_hidden_layers: 6
  num_attention_heads: 8
  intermediate_size: 2048
  hidden_act: gelu
  hidden_dropout_prob: 0.10
  attention_probs_dropout_prob: 0.10
  max_position_embeddings: 512
  vocab_size: 32128
  label_smoothing: 0.10
  shared_embeddings: true        # share source/target embedding matrix

tokenizer:
  vocab_file: models/shimaore_bert_v2/vocab.txt
  tokenizer_config: models/shimaore_bert_v2/tokenizer_config.json
  do_lower_case: false
  max_length: 512

data:
  train_file: data/processed/train.csv
  validation_file: data/processed/val.csv
  test_file: data/processed/test.csv
  raw_file: shimaore_french_dataset.csv
  train_split: 0.80
  val_split: 0.10
  test_split: 0.10
  max_length_ratio: 3.0
  min_tokens: 2
  back_translation: true
  back_translation_ratio: 1.0
  bt_weight: 0.3

training:
  output_dir: models/shimaore_bert_v2
  num_train_epochs: 45
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-5
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1.0e-8
  max_grad_norm: 1.0
  warmup_ratio: 0.06
  lr_scheduler_type: cosine_with_restarts
  label_smoothing_factor: 0.10
  predict_with_generate: true
  evaluation_strategy: steps
  eval_steps: 500
  save_strategy: steps
  save_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: bleu
  greater_is_better: true
  gradient_checkpointing: true
  seed: 42
  dataloader_num_workers: 4
  logging_steps: 100
  report_to: [tensorboard]
  fp16: false
  bf16: false

decoding:
  num_beams: 5
  max_length: 256
  min_length: 1
  length_penalty: 1.2
  no_repeat_ngram_size: 3
  repetition_penalty: 1.3
  early_stopping: true

evaluation:
  metrics: [bleu, chrf, ter]
  sacrebleu_tokenize: intl
